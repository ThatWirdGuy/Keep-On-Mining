   <script>
  var canvas = document.querySelector("#unity-canvas");
  var loadingBar = document.querySelector("#unity-loading-bar");
  var progressBarFull = document.querySelector("#unity-progress-bar-full");

  var buildUrl = "Build";
  var loaderUrl = buildUrl + "/7a2dbded24d57e056180125b1583e7c4.loader.js";

  var config = {
    dataUrl: buildUrl + "/e29695efbcf5ebbb46a7758c5afb6fd8.data.br",
    frameworkUrl: buildUrl + "/192dc58933867dc05ab7d6f586760fba.framework.js.br",
    codeUrl: buildUrl + "/0a22e241de4d50d15d1aaedf9730a256.wasm.br",
    streamingAssetsUrl: "StreamingAssets",
    companyName: "madkidgames.com",
    productName: "Keep on Mining",
    productVersion: "1.0.1", // Increment this to force-clear old cache
    cacheControl: function (url) { return "no-cache"; },
    dataCaching: false, 
  };

  var script = document.createElement("script");
  script.src = loaderUrl;
  script.onload = () => {
    createUnityInstance(canvas, config, (progress) => {
