<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Keep on Mining</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body style="text-align: center; background-color: #231f20; margin: 0; padding: 0;">
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=540 style="background: #231f20"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");

      var buildUrl = "Build";
      // Generate the version string once
      var v = "?v=" + Date.now();

      // FIX 1: Apply the cache buster to the loader URL as well
      var loaderUrl = buildUrl + "/7a2dbded24d57e056180125b1583e7c4.loader.js" + v;

      var config = {
        dataUrl: buildUrl + "/e29695efbcf5ebbb46a7758c5afb6fd8.data" + v,
        frameworkUrl: buildUrl + "/192dc58933867dc05ab7d6f586760fba.framework.js" + v,
        codeUrl: buildUrl + "/0a22e241de4d50d15d1aaedf9730a256.wasm" + v,
        streamingAssetsUrl: "StreamingAssets",
        companyName: "madkidgames.com",
        productName: "Keep on Mining",
        productVersion: "1.0",
      };

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        // FIX 2: Ensure createUnityInstance is called correctly
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          loadingBar.style.display = "none";
        }).catch((message) => {
          console.error(message); // Log to console for easier debugging
          alert("Load Failed: " + message);
        });
      };
      document.body.appendChild(script);
    </script>
  </body>
</html>
