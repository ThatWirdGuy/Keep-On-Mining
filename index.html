  <script>
  (function () {
    const BRAND = 'MadKidGames';
    const WHITELIST_URL = 'https://keep-on-mining.vercel.app/whitelisted.json';
    const GAME_ENUM = 'KEEP_ON_MINING';
    const OFFICIAL_SITE = 'https://keep-on-mining.vercel.app';
    const REDIRECT_DELAY = 300000;

    function normalize(d) {
      return (d || '').toLowerCase().replace(/^www\./, '').replace(/:\d+$/, '');
    }

    function safe(fn) {
      try { const v = fn(); return v ? normalize(v) : null; } catch { return null; }
    }

    function getFlag(flags, key, def) {
      return flags && flags[key] !== undefined ? flags[key] : def;
    }

    let DEBUG = false;
    const selfHost = normalize(location.hostname);
    const signals = [];

    signals.push(safe(() => window.location.ancestorOrigins?.[0] ? new URL(window.location.ancestorOrigins[0]).hostname : null));
    signals.push(safe(() => window.top?.location?.hostname));
    signals.push(safe(() => window.parent?.location?.hostname));
    signals.push(safe(() => document.referrer && new URL(document.referrer).hostname));
    signals.push(safe(() => window.opener?.location?.hostname));

    const uniqueSignals = [...new Set(signals.filter(Boolean))];
    const foreignSignals = uniqueSignals.filter(d => d !== selfHost);
    const jsEmbeddingDomain = foreignSignals.length > 0 ? foreignSignals[0] : selfHost;

    function waitForUnity(cb) {
      const t = setInterval(() => {
        if (window.unityInstance && window.unityInstance.SendMessage) {
          clearInterval(t);
          cb();
        }
      }, 100);
    }

    fetch(WHITELIST_URL + '?v=' + Date.now(), { cache: 'no-store' })
      .then(r => r.json())
      .then(json => {
        const flags = json.flags || {};
        const APPLY_ENFORCEMENT = getFlag(flags, 'redirect_on_reject', false);
        const CHECK_DOMAIN = getFlag(flags, 'enforce_domain_check', true);
        const game = (json.whitelisted_games || []).find(g => g.game_enum === GAME_ENUM);
        const allowedDomains = (json.allowed_domains || []).map(normalize);

        let allowed = true;
        if (CHECK_DOMAIN) {
          allowed = !!game && allowedDomains.includes(jsEmbeddingDomain);
        }

        waitForUnity(() => {
          if (allowed || !APPLY_ENFORCEMENT) {
            unityInstance.SendMessage('H5MadKidGames', 'H5_OnDomainApproved');
          } else {
            unityInstance.SendMessage('H5MadKidGames', 'H5_OnDomainRejected');
            setTimeout(() => {
              try { window.top.location.href = game?.original_game_url || OFFICIAL_SITE; } 
              catch { location.href = OFFICIAL_SITE; }
            }, REDIRECT_DELAY);
          }
        });
      })
      .catch(err => {
        waitForUnity(() => { unityInstance.SendMessage('H5MadKidGames', 'H5_OnDomainApproved'); });
      });
  })();
  </script>

    window.addEventListener("load", function () {

      const spinner = document.getElementById("custom-loading-spinner");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        const div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        
        if (type == 'error') {
          div.style = 'background: red; padding: 10px; color: white;';
          alert("Unity Error: " + msg); // Alerts specific errors from the engine
        } else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function () {
            if (div.parentNode) warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      const buildUrl = "Build";
      const loaderUrl = buildUrl + "/7a2dbded24d57e056180125b1583e7c4.loader.js";

      const config = {

      }

      canvas.style.background = "url('" + buildUrl + "/513047b48a3896bb5a1c88974cf436c0.jpg') center / cover";

      const script = document.createElement("script");

          if (spinner) spinner.style.display = "none";
        }).catch((message) => {
          alert("Unity Instance Error: " + message); // Alerts if the loader fails to initialize
        });
      };
      document.body.appendChild(script);
    });

    // Auto-resize Logic
    (function () {
      function resizeUnityCanvas() {
        const canvas = document.getElementById('unity-canvas');
        if (!canvas) return;
        const targetAspect = 16 / 9;
        const windowWidth = window.innerWidth;
        const windowHeight = window.innerHeight;
        let newWidth = windowWidth;
        let newHeight = windowWidth / targetAspect;
        if (newHeight > windowHeight) {
          newHeight = windowHeight;
          newWidth = newHeight * targetAspect;
        }
        canvas.style.width = newWidth + 'px';
        canvas.style.height = newHeight + 'px';
      }
      window.addEventListener('load', resizeUnityCanvas);
      window.addEventListener('resize', resizeUnityCanvas);
      window.addEventListener('orientationchange', resizeUnityCanvas);
    })();
  </script>
